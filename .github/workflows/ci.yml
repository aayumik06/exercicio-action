name: Teste de API

on: [push, pull_request]

jobs:
  verificar-api:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Rodar Testes
        run: pytest test_main.py

      - name: Subir a API e testar requisição (Integração)
        run: |
          # 0 '&' no final roda a API em background para não travar o Runner
          python -m fastapi run main.py --port 8000 &

          # Dá 3 segundos para o servidor ligar completamente
          sleep 3

          # O '-f' faz o CI falhar se a API retornar erro (ex: 404 ou 500)
          curl -f http://localhost:8000/
          curl -f http://localhost:8000/somar/10/20
